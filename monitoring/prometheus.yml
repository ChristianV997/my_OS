global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: marketos_api
    static_configs:
      - targets: ["api:3000"]
    metrics_path: /metrics/prometheus

  - job_name: celery_worker
    static_configs:
      - targets: ["worker:9200"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

name: System Run

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:
    inputs:
      cycles:
        description: 'Number of cycles to run'
        required: false
        default: '200'
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # Restore the previous persisted state so the model keeps learning
      - name: Restore state
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: state/
          key: marketos-state-${{ github.run_id }}
          restore-keys: |
            marketos-state-

      - name: Run cycles
        run: |
          python scripts/run_cycles.py \
            --cycles ${{ github.event.inputs.cycles || '200' }} \
            --state-path state/state.json

      # Always save, even on failure, so state is never lost
      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state/
          key: marketos-state-${{ github.run_id }}

      - name: Generate job summary
        if: always()
        run: python scripts/report.py >> $GITHUB_STEP_SUMMARY

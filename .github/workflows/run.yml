name: System Run

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:
    inputs:
      cycles:
        description: 'Number of cycles to run'
        required: false
        default: '200'
        type: string
      drift_window:
        description: 'Events per drift comparison window'
        required: false
        default: '200'
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # Restore the previous persisted state so the model keeps learning
      - name: Restore state
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: state/
          key: marketos-state-${{ github.run_id }}
          restore-keys: |
            marketos-state-

      - name: Run cycles
        run: |
          python scripts/run_cycles.py \
            --cycles ${{ github.event.inputs.cycles || '200' }} \
            --state-path state/state.db

      # Always save state first so it's never lost even if reporting fails
      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state/
          key: marketos-state-${{ github.run_id }}

      - name: Generate job summary
        if: always()
        run: python scripts/report.py >> $GITHUB_STEP_SUMMARY

      - name: Drift detection report
        if: always()
        run: |
          python scripts/drift_report.py \
            --state-path state/state.db \
            --window ${{ github.event.inputs.drift_window || '200' }} \
            --out drift_report.json \
            >> $GITHUB_STEP_SUMMARY

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_id }}
          path: drift_report.json
          retention-days: 30
          if-no-files-found: ignore

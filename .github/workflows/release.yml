name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # Full test suite must pass before releasing
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest -v

  # Run a deep benchmark to produce release metrics
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run release benchmark (500 cycles)
        run: python scripts/benchmark.py --cycles 500 --output release-bench.json

      - name: Build release archive
        run: |
          zip -r marketos-v4.zip . \
            -x "*.git*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x "state/*" \
            -x ".pytest_cache/*"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            marketos-v4.zip
            release-bench.json
          retention-days: 90

  # Create the GitHub Release with metrics in the body
  publish:
    needs: [ test, benchmark ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build release notes
        run: |
          TAG="${{ github.ref_name }}"
          python - << 'PY'
          import json, os, sys
          tag = os.environ.get("GITHUB_REF_NAME", "v?")
          with open("release/release-bench.json") as f:
              m = json.load(f)

          lines = [
              f"# MarketOS {tag}",
              "",
              "## Release Benchmark (500 cycles, clean state)",
              "",
              "| Metric | Value |",
              "|--------|-------|",
              f"| Capital Gain | ${m['capital_gain']:+,.2f} |",
              f"| Avg ROAS | {m['avg_roas']:.4f} |",
              f"| ROAS Trend (slope) | {m['roas_trend_slope']:+.6f} |",
              f"| Causal Edges Learned | {m['causal_edges']} |",
              f"| Memory Size | {m['memory_size']:,} |",
              f"| Runtime | {m['elapsed_s']:.1f}s |",
              "",
              "### Variant Performance",
              "",
              "| Variant | Avg ROAS |",
              "|---------|----------|",
          ]
          for v, avg in sorted(m.get("variant_avg_roas", {}).items()):
              lines.append(f"| {v} | {avg:.4f} |")

          lines += [
              "",
              "---",
              "_Generated automatically by the release workflow._",
          ]
          with open("release_notes.md", "w") as f:
              f.write("\n".join(lines))
          print("Release notes written.")
          PY

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('release_notes.md', 'utf8');
            const tag = context.ref.replace('refs/tags/', '');

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `MarketOS ${tag}`,
              body: body,
              draft: false,
              prerelease: tag.includes('-'),
            });

            // attach the zip archive
            const zip = fs.readFileSync('release/marketos-v4.zip');
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: `marketos-${tag}.zip`,
              data: zip,
            });

            console.log(`Release created: ${release.data.html_url}`);

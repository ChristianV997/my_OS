name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (tolerant)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi
          pip install pytest || true

      - name: Compile check
        run: python -m compileall -q .

      - name: Run tests (optional)
        run: |
          if [ -d tests ]; then pytest tests/ -v || true; else echo "No tests dir"; fi

      - name: Smoke run (updated)
        run: |
          python - << 'PY'
          from backend.core.system_v5 import SystemV5
          from backend.decision.engine import decide

          class DummyEnv:
              def execute(self, action):
                  return {"roas": 1.0, "revenue": 100.0, "orders": 1, "cost": 50.0}

          s = SystemV5()
          # run a few cycles using new API
          for _ in range(3):
              s.run_cycle(DummyEnv(), decide)

          print("OK — smoke passed")
          PY

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall -q .

      - name: Run tests
        run: pytest tests/ -v

      - name: Smoke run (10 cycles)
        run: |
          python - << 'PY'
          from backend.core.state import SystemState
          from backend.execution.loop import run_cycle
          s = SystemState()
          for _ in range(10):
              s = run_cycle(s)
          assert len(s.event_log.rows) > 0
          assert s.total_cycles == 10
          print(f"OK — {s.total_cycles} cycles, capital=${s.capital:.2f}, regime={s.detected_regime}")
          PY

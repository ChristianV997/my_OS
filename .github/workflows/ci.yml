name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (basic)
        run: |
          python - << 'PY'
import compileall, sys
ok = compileall.compile_dir('.', force=True, quiet=1)
sys.exit(0 if ok else 1)
PY

      - name: Run tests
        run: pytest -v

      - name: Smoke run (5 cycles)
        run: |
          python - << 'PY'
from backend.core.state import SystemState
from backend.execution.loop import run_cycle
s=SystemState()
for _ in range(5): s=run_cycle(s)
print('OK')
PY

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall -q .

      - name: Run tests
        run: pytest tests/ -v

      - name: Smoke run (10 cycles)
        run: |
          python - << 'PY'
          from backend.core.state import SystemState
          from backend.execution.loop import run_cycle
          s = SystemState()
          for _ in range(10):
              s = run_cycle(s)
          assert len(s.event_log.rows) > 0
          assert s.total_cycles == 10
          print(f"OK — {s.total_cycles} cycles, capital=${s.capital:.2f}, regime={s.detected_regime}")
          PY

name: CI_v2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Compile check
        run: python -m compileall .

      - name: Run tests
        run: pytest tests -q

      - name: Smoke system
        run: |
          python - << 'PY'
from backend.core.state import SystemState
from backend.execution.loop import run_cycle
s=SystemState()
for _ in range(10): s=run_cycle(s)
assert len(s.event_log.rows)>0
print('SYSTEM OK')
PY
